<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymFlow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24; --border: #2a2a35;
    --accent: #e8ff47; --accent2: #ff6b35; --text: #f0f0f0; --muted: #6b6b7e;
    --pause-color: #4fc3f7; --green: #69f0ae; --red: #ff5252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }
 
  /* HOME */
  #home { padding: 32px 24px 100px; gap: 0; overflow-y: auto; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px; color: var(--accent); line-height: 1; }
  .logo span { color: var(--muted); font-size: 14px; letter-spacing: 2px; font-family: 'DM Sans', sans-serif; display: block; margin-top: 4px; font-weight: 300; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px; color: var(--muted); margin: 32px 0 12px; }
  .exercise-list { display: flex; flex-direction: column; gap: 8px; }
  .exercise-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .exercise-card:hover { border-color: var(--accent); }
  .card-main { display: flex; align-items: center; gap: 14px; padding: 16px; }
  .ex-info { flex: 1; }
  .ex-name { font-weight: 600; font-size: 15px; }
  .ex-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .ex-last { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ex-badge { font-size: 10px; font-weight: 600; letter-spacing: 1px; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; flex-shrink: 0; }
  .badge-timer { background: rgba(232,255,71,0.15); color: var(--accent); }
  .badge-reps { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .del-btn { width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .confirm-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: rgba(255,82,82,0.1); border-top: 1px solid rgba(255,82,82,0.25); font-size: 13px; color: var(--red); }
  .confirm-bar span { flex: 1; font-weight: 600; }
  .confirm-yes { padding: 6px 14px; border-radius: 8px; border: none; background: var(--red); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
  .confirm-no { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  /* DRUM ROLLER */
  .drum-wrap { display: flex; align-items: center; gap: 4px; }
  .drum {
    width: 52px; height: 120px;
    overflow: hidden;
    position: relative;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: ns-resize;
    user-select: none;
  }
  .drum::before, .drum::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 36px;
    z-index: 2;
    pointer-events: none;
  }
  .drum::before { top: 0; background: linear-gradient(to bottom, var(--surface2), transparent); }
  .drum::after { bottom: 0; background: linear-gradient(to top, var(--surface2), transparent); }
  .drum-highlight {
    position: absolute;
    top: 50%; left: 4px; right: 4px;
    height: 36px;
    transform: translateY(-50%);
    border-radius: 8px;
    background: rgba(232,255,71,0.12);
    border: 1px solid rgba(232,255,71,0.3);
    pointer-events: none;
    z-index: 1;
  }
  .drum-inner {
    position: absolute;
    top: 0; left: 0; right: 0;
    transition: transform 0.15s ease;
  }
  .drum-item {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--muted);
    transition: color 0.15s;
  }
  .drum-item.selected { color: var(--accent); }
  .drum-sep { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--muted); padding: 0 2px; }
  .drum-unit { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); margin-left: 6px; }
 
  .ctx-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .ctx-overlay.visible { opacity: 1; pointer-events: all; }
  .ctx-menu { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 12px 16px 36px; display: flex; flex-direction: column; gap: 8px; transform: translateY(20px); transition: transform 0.2s; }
  .ctx-overlay.visible .ctx-menu { transform: translateY(0); }
  .ctx-title { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; color: var(--muted); text-align: center; padding: 8px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .ctx-btn { display: flex; align-items: center; gap: 14px; padding: 16px; border-radius: 14px; border: none; background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; text-align: left; transition: background 0.15s; }
  .ctx-btn:active { background: var(--border); }
  .ctx-btn-icon { font-size: 20px; width: 32px; text-align: center; }
  .ctx-btn.danger { color: var(--red); }
  .ctx-cancel { display: flex; align-items: center; justify-content: center; padding: 16px; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 4px; }
 
  .fab { position: fixed; bottom: 28px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; font-size: 28px; color: var(--bg); box-shadow: 0 4px 24px rgba(232,255,71,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 8px; padding: 60px 0; }
  .empty-state .emoji { font-size: 48px; }
  .empty-state p { font-size: 14px; }
 
  /* CREATE */
  #create { padding: 0; }
  .page-header { display: flex; align-items: center; gap: 12px; padding: 32px 24px 20px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .back-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; flex: 1; }
  .form-body { padding: 24px; flex: 1; overflow-y: auto; padding-bottom: 120px; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--muted); }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn { padding: 14px; border-radius: 12px; border: 2px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
  .type-btn.active-timer { border-color: var(--accent); background: rgba(232,255,71,0.08); color: var(--accent); }
  .type-btn.active-reps { border-color: var(--accent2); background: rgba(255,107,53,0.08); color: var(--accent2); }
  .sets-config { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .set-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
  .set-row:last-child { border-bottom: none; }
  .set-label { flex: 1; font-size: 14px; font-weight: 500; }
  .set-sublabel { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stepper { display: flex; align-items: center; gap: 12px; }
  .step-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; min-width: 42px; text-align: center; color: var(--accent); }
  .toggle-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
  .toggle-row:last-child { border-bottom: none; }
  .toggle { width: 44px; height: 24px; border-radius: 12px; background: var(--border); position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(20px); }
  .time-summary { background: rgba(232,255,71,0.06); border: 1px solid rgba(232,255,71,0.2); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .time-summary-val { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--accent); margin-top: 2px; }
  .time-summary-sub { font-size: 11px; color: var(--muted); }
  .save-btn { position: fixed; bottom: 28px; left: 24px; right: 24px; padding: 18px; background: var(--accent); border: none; border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--bg); cursor: pointer; z-index: 100; }
 
  /* WORKOUT */
  #workout { padding: 0; background: var(--bg); }
  .workout-header { display: flex; align-items: center; padding: 32px 24px 8px; gap: 12px; }
  .workout-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; flex: 1; }
  .workout-weight-bar { padding: 0 24px 8px; font-size: 13px; color: var(--accent2); font-weight: 600; }
  .series-progress { display: flex; gap: 6px; padding: 0 24px 16px; flex-wrap: wrap; }
  .series-dot { height: 6px; border-radius: 3px; background: var(--border); flex: 1; transition: background 0.3s; min-width: 20px; }
  .series-dot.done { background: var(--green); }
  .series-dot.active { background: transparent; border: 2px dashed var(--accent); animation: dash-pulse 1s ease-in-out infinite; }
  @keyframes dash-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
 
  /* TIMER */
  .timer-display { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 24px 20px; flex: 1; }
  .phase-label { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .phase-label.work { color: var(--accent); }
  .clock-ring { position: relative; width: 220px; height: 220px; margin: 0 auto 24px; }
  .clock-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .clock-ring .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .clock-ring .ring-progress { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
  .clock-time { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 2px; line-height: 1; color: var(--text); }
  .timer-controls { display: flex; gap: 12px; padding: 0 24px; margin-bottom: 12px; }
  .ctrl-btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1.5px; cursor: pointer; }
  .btn-play { background: var(--accent); color: var(--bg); font-size: 20px; }
  .btn-skip { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .btn-reset { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .auto-badge { margin: 0 24px 8px; padding: 8px 14px; background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2); border-radius: 10px; font-size: 12px; color: var(--accent); letter-spacing: 1px; text-align: center; }
 
  /* REPS */
  .reps-display { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 24px; flex: 1; gap: 16px; }
  .reps-info { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; color: var(--muted); margin-bottom: 28px; }
  .reps-big { font-family: 'Bebas Neue', sans-serif; font-size: 96px; line-height: 1; color: var(--accent); margin-bottom: 8px; }
  .reps-label { font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
  .validate-btn { width: 260px; height: 260px; border-radius: 50%; background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--bg); cursor: pointer; margin: auto; box-shadow: 0 0 60px rgba(232,255,71,0.35); transition: transform 0.1s, box-shadow 0.1s; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
  .validate-btn:active { transform: scale(0.93); box-shadow: 0 0 24px rgba(232,255,71,0.15); }
  .prev-serie-btn { width: 100%; padding: 14px; border-radius: 14px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
 
  /* PAUSE OVERLAY */
  .pause-overlay { position: fixed; inset: 0; background: rgba(13,13,15,0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .pause-overlay.visible { opacity: 1; pointer-events: all; }
  .pause-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; }
  .pause-sub { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 48px; }
  .skip-pause-btn { padding: 14px 36px; border-radius: 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; cursor: pointer; }
  .pause-ring-wrap { position: relative; width: 260px; height: 260px; margin-bottom: 12px; }
  .pause-ring-wrap svg { position: absolute; top:0; left:0; transform: rotate(-90deg); }
  .pause-ring-time { position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); font-family: 'Bebas Neue', sans-serif; font-size: 110px; color: var(--accent); line-height: 1; }
 
  /* DONE */
  .done-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 32px; text-align: center; }
  .done-emoji { font-size: 72px; margin-bottom: 24px; }
  .done-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; color: var(--accent); margin-bottom: 12px; }
  .done-sub { font-size: 15px; color: var(--muted); margin-bottom: 32px; }
  .done-btn { width: 100%; padding: 18px; border-radius: 16px; background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--bg); cursor: pointer; margin-bottom: 12px; }
  .done-btn-outline { width: 100%; padding: 18px; border-radius: 16px; background: transparent; border: 1px solid var(--border); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--muted); cursor: pointer; }
 
  /* HISTORY */
  #history { padding: 0; }
  .history-list { padding: 20px 24px 60px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .history-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; position: relative; }
  .history-date { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 6px; }
  .history-info { font-size: 14px; font-weight: 600; }
  .history-weight { font-size: 13px; color: var(--accent2); margin-top: 4px; font-weight: 600; }
  .history-del { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; }
</style>
</head>
<body>
 
<!-- HOME -->
<div id="home" class="screen active">
  <div class="logo">GYMFLOW <span>TRACKER</span></div>
  <div class="section-title">MES EXERCICES</div>
  <div class="exercise-list" id="exercise-list"></div>
  <button class="fab" onclick="openCreate()">+</button>
</div>
 
<!-- CREATE -->
<div id="create" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="page-title" id="create-title">NOUVEL EXERCICE</div>
  </div>
  <div class="form-body">
    <div class="field">
      <label>Nom de l'exercice</label>
      <input class="input" type="text" id="ex-name" placeholder="Ex: Gainage, Squat, Curl…">
    </div>
    <div class="field">
      <label>Type</label>
      <div class="type-toggle">
        <button class="type-btn active-timer" id="btn-timer" onclick="setType('timer')">⏱ Avec Timer</button>
        <button class="type-btn" id="btn-reps" onclick="setType('reps')">🔁 Répétitions</button>
      </div>
    </div>
    <div class="field">
      <label>Configuration des séries</label>
      <div class="sets-config" id="sets-config"></div>
    </div>
    <div class="field">
      <label>Pause entre séries</label>
      <div class="sets-config">
        <div class="toggle-row">
          <div class="set-label">Activer la pause<div class="set-sublabel">Un décompte entre chaque série</div></div>
          <div class="toggle" id="pause-toggle" onclick="togglePause()"></div>
        </div>
        <div class="set-row" id="pause-duration-row" style="display:none">
          <div class="set-label">Durée de la pause</div>
          <div class="stepper">
            <button class="step-btn" onclick="stepPause(-5)">−</button>
            <div class="step-val" id="pause-val">30s</div>
            <button class="step-btn" onclick="stepPause(5)">+</button>
          </div>
        </div>
      </div>
    </div>
    <div class="field" id="field-auto" style="display:none">
      <label>Mode automatique</label>
      <div class="sets-config">
        <div class="toggle-row">
          <div class="set-label">Tout en auto<div class="set-sublabel">Enchaîne les séries et pauses automatiquement</div></div>
          <div class="toggle" id="auto-toggle" onclick="toggleAuto()"></div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Poids</label>
      <div class="sets-config">
        <div class="toggle-row">
          <div class="set-label">Exercice avec poids<div class="set-sublabel">Haltère, barre, machine…</div></div>
          <div class="toggle" id="weight-toggle" onclick="toggleWeight()"></div>
        </div>
        <div class="set-row" id="weight-row" style="display:none">
          <div class="set-label">Poids (kg)</div>
          <div class="drum-wrap">
            <div class="drum" id="drum-tens">
              <div class="drum-inner" id="drum-tens-inner"></div>
            </div>
            <div class="drum-sep">.</div>
            <div class="drum" id="drum-units">
              <div class="drum-inner" id="drum-units-inner"></div>
            </div>
            <div class="drum-unit">kg</div>
          </div>
        </div>
      </div>
    </div>
    <div class="field" id="time-summary-field" style="display:none">
      <label>Durée totale estimée</label>
      <div class="time-summary">
        <div style="font-size:24px">⏳</div>
        <div style="flex:1">
          <div class="time-summary-val" id="time-summary-val">—</div>
          <div class="time-summary-sub" id="time-summary-sub"></div>
        </div>
      </div>
    </div>
  </div>
  <button class="save-btn" onclick="saveExercise()">ENREGISTRER</button>
</div>
 
<!-- WORKOUT -->
<div id="workout" class="screen">
  <div class="workout-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="workout-name" id="workout-name"></div>
    <button class="back-btn" onclick="openHistory()" style="font-size:15px">📋</button>
  </div>
  <div class="workout-weight-bar" id="workout-weight-bar" style="display:none"></div>
  <div class="series-progress" id="series-progress"></div>
  <div id="workout-body"></div>
  <div class="pause-overlay" id="pause-overlay">
    <div class="pause-title">PAUSE</div>
    <div class="pause-ring-wrap">
      <svg width="260" height="260" viewBox="0 0 260 260">
        <circle cx="130" cy="130" r="118" style="fill:none;stroke:var(--surface2);stroke-width:8"/>
        <circle id="pause-ring-path" cx="130" cy="130" r="118" style="fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round"/>
      </svg>
      <div class="pause-ring-time" id="pause-ring-time">30</div>
    </div>
    <div class="pause-sub">Prépare-toi</div>
    <button class="skip-pause-btn" onclick="skipPause()">PASSER →</button>
  </div>
</div>
 
<!-- HISTORY -->
<div id="history" class="screen">
  <div class="page-header">
    <button class="back-btn" id="hist-back">←</button>
    <div class="page-title" id="hist-title">HISTORIQUE</div>
  </div>
  <div class="history-list" id="history-list"></div>
</div>
 
<!-- CONTEXT MENU -->
<div class="ctx-overlay" id="ctx-overlay" onclick="closeCtxMenu()">
  <div class="ctx-menu" onclick="event.stopPropagation()">
    <div class="ctx-title" id="ctx-title">OPTIONS</div>
    <button class="ctx-btn" id="ctx-edit"><span class="ctx-btn-icon">✏️</span> Modifier</button>
    <button class="ctx-btn" id="ctx-duplicate"><span class="ctx-btn-icon">📋</span> Dupliquer</button>
    <button class="ctx-btn danger" id="ctx-delete"><span class="ctx-btn-icon">🗑</span> Supprimer</button>
    <button class="ctx-cancel" onclick="closeCtxMenu()">Annuler</button>
  </div>
</div>
 
<script>
// ===== DATA =====
let exercises = JSON.parse(localStorage.getItem('gymflow_exercises') || '[]');
const form = { type:'timer', sets:5, workSecs:60, reps:10, repsEnabled:false, pauseEnabled:false, pauseSecs:30, autoMode:false, weightEnabled:false, weight:10 };
let editingIdx = null;
 
// ===== HOME =====
function renderHome() {
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  if (!exercises.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🏋️</div><p>Aucun exercice enregistré</p><p>Appuie sur + pour en créer un</p></div>`;
    return;
  }
  exercises.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    const last = lastHistoryStr(i);
    card.innerHTML = `
      <div class="card-main">
        <div class="ex-info">
          <div class="ex-name">${ex.name}${ex.weightEnabled ? ' — ' + ex.weight + ' kg' : ''}</div>
          <div class="ex-meta">${exMeta(ex)}</div>
          ${last ? `<div class="ex-last">Dernière séance : ${last}</div>` : ''}
        </div>
        <span class="ex-badge ${ex.type==='timer'?'badge-timer':'badge-reps'}">${ex.type==='timer'?'Timer':'Reps'}</span>
      </div>`;
    let pt, dlp = false;
    card.addEventListener('touchstart', e => { dlp=false; pt=setTimeout(()=>{dlp=true;openCtxMenu(i);},500); });
    card.addEventListener('touchend', ()=>clearTimeout(pt));
    card.addEventListener('touchmove', ()=>clearTimeout(pt));
    card.addEventListener('mousedown', e => { dlp=false; pt=setTimeout(()=>{dlp=true;openCtxMenu(i);},500); });
    card.addEventListener('mouseup', ()=>clearTimeout(pt));
    card.addEventListener('click', e => { if(dlp){dlp=false;return;} startWorkout(i); });
    list.appendChild(card);
  });
}
 
function lastHistoryStr(exIdx) {
  const h = JSON.parse(localStorage.getItem('gymflow_history')||'[]').filter(e=>e.exIdx===exIdx);
  if (!h.length) return null;
  const last = h[h.length-1];
  const d = new Date(last.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
  return d + (last.weight ? ` · ${last.weight} kg` : '');
}
 
let ctxIdx = -1;
 
function openCtxMenu(i) {
  ctxIdx = i;
  const ex = exercises[i];
  document.getElementById('ctx-title').textContent = ex.name.toUpperCase();
  document.getElementById('ctx-edit').onclick = () => { closeCtxMenu(); openEdit(i); };
  document.getElementById('ctx-duplicate').onclick = () => { closeCtxMenu(); duplicateExercise(i); };
  document.getElementById('ctx-delete').onclick = () => { closeCtxMenu(); confirmDeleteCtx(i); };
  document.getElementById('ctx-overlay').classList.add('visible');
}
 
function closeCtxMenu() {
  document.getElementById('ctx-overlay').classList.remove('visible');
  ctxIdx = -1;
}
 
function duplicateExercise(i) {
  const copy = JSON.parse(JSON.stringify(exercises[i]));
  copy.name = copy.name + ' (copie)';
  exercises.splice(i+1, 0, copy);
  localStorage.setItem('gymflow_exercises', JSON.stringify(exercises));
  renderHome();
}
 
function confirmDeleteCtx(i) {
  const ex = exercises[i];
  // Inline confirm on the card
  const list = document.getElementById('exercise-list');
  const card = list.querySelectorAll('.exercise-card')[i];
  if (!card || card.querySelector('.confirm-bar')) return;
  const bar = document.createElement('div');
  bar.className = 'confirm-bar';
  bar.innerHTML = `<span>Supprimer "${ex.name}" ?</span><button class="confirm-yes">Oui</button><button class="confirm-no">Non</button>`;
  bar.querySelector('.confirm-yes').onclick = () => { exercises.splice(i,1); localStorage.setItem('gymflow_exercises',JSON.stringify(exercises)); wEx=null; renderHome(); };
  bar.querySelector('.confirm-no').onclick = () => bar.remove();
  card.appendChild(bar);
}
 
function exMeta(ex) {
  if (ex.type==='timer') {
    const p = ex.pauseEnabled ? ` · Pause ${fmtTime(ex.pauseSecs)}` : '';
    const a = ex.autoMode ? ' · ⚡Auto' : '';
    return `${ex.sets} séries · ${fmtTime(ex.workSecs)} travail${p}${a}`;
  } else {
    const r = ex.repsEnabled ? ` × ${ex.reps} reps` : '';
    const p = ex.pauseEnabled ? ` · Pause ${fmtTime(ex.pauseSecs)}` : '';
    return `${ex.sets} séries${r}${p}`;
  }
}
 
function fmtTime(s) { if(s<60) return s+'s'; const m=Math.floor(s/60),r=s%60; return r?`${m}m${r}s`:`${m}min`; }
 
// ===== CREATE =====
function openCreate() {
  editingIdx=null;
  Object.assign(form,{type:'timer',sets:5,workSecs:60,reps:10,repsEnabled:false,pauseEnabled:false,pauseSecs:30,autoMode:false,weightEnabled:false,weight:10});
  document.getElementById('ex-name').value='';
  document.getElementById('create-title').textContent='NOUVEL EXERCICE';
  renderTypeForm(); showScreen('create');
}
 
function openEdit(i) {
  editingIdx=i; const ex=exercises[i];
  Object.assign(form,{type:ex.type,sets:ex.sets,workSecs:ex.workSecs||60,reps:ex.reps||10,repsEnabled:ex.repsEnabled||false,pauseEnabled:ex.pauseEnabled,pauseSecs:ex.pauseSecs||30,autoMode:ex.autoMode||false,weightEnabled:ex.weightEnabled||false,weight:ex.weight||10});
  document.getElementById('ex-name').value=ex.name;
  document.getElementById('create-title').textContent='MODIFIER';
  renderTypeForm(); showScreen('create');
}
 
function setType(t) {
  form.type=t;
  document.getElementById('btn-timer').className='type-btn'+(t==='timer'?' active-timer':'');
  document.getElementById('btn-reps').className='type-btn'+(t==='reps'?' active-reps':'');
  renderTypeForm();
}
 
function renderTypeForm() {
  const cfg = document.getElementById('sets-config');
  if (form.type==='timer') {
    cfg.innerHTML=`
      <div class="set-row">
        <div class="set-label">Nombre de séries<div class="set-sublabel">Répétitions de l'intervalle</div></div>
        <div class="stepper"><button class="step-btn" onclick="stepSets(-1)">−</button><div class="step-val" id="v-sets">${form.sets}</div><button class="step-btn" onclick="stepSets(1)">+</button></div>
      </div>
      <div class="set-row">
        <div class="set-label">Durée de travail<div class="set-sublabel">Par série</div></div>
        <div class="stepper"><button class="step-btn" onclick="stepWork(-5)">−</button><div class="step-val" id="v-work">${fmtTime(form.workSecs)}</div><button class="step-btn" onclick="stepWork(5)">+</button></div>
      </div>`;
    document.getElementById('field-auto').style.display='block';
    document.getElementById('auto-toggle').className='toggle'+(form.autoMode?' on':'');
  } else {
    cfg.innerHTML=`
      <div class="set-row">
        <div class="set-label">Nombre de séries</div>
        <div class="stepper"><button class="step-btn" onclick="stepSets(-1)">−</button><div class="step-val" id="v-sets">${form.sets}</div><button class="step-btn" onclick="stepSets(1)">+</button></div>
      </div>
      <div class="toggle-row">
        <div class="set-label">Répétitions par série<div class="set-sublabel">Afficher le nombre de reps</div></div>
        <div class="toggle ${form.repsEnabled?'on':''}" id="reps-toggle" onclick="toggleReps()"></div>
      </div>
      <div class="set-row" id="reps-stepper-row" style="display:${form.repsEnabled?'flex':'none'}">
        <div class="set-label">Nombre de répétitions</div>
        <div class="stepper"><button class="step-btn" onclick="stepReps(-1)">−</button><div class="step-val" id="v-reps">${form.reps}</div><button class="step-btn" onclick="stepReps(1)">+</button></div>
      </div>`;
    document.getElementById('field-auto').style.display='none';
  }
  document.getElementById('pause-toggle').className='toggle'+(form.pauseEnabled?' on':'');
  document.getElementById('pause-duration-row').style.display=form.pauseEnabled?'flex':'none';
  document.getElementById('pause-val').textContent=fmtTime(form.pauseSecs);
  document.getElementById('weight-toggle').className='toggle'+(form.weightEnabled?' on':'');
  const wr=document.getElementById('weight-row');
  wr.style.display=form.weightEnabled?'flex':'none';
  if(form.weightEnabled) setTimeout(initDrums, 0);
  updateTimeSummary();
}
 
function stepSets(d){form.sets=Math.max(1,form.sets+d);const e=document.getElementById('v-sets');if(e)e.textContent=form.sets;updateTimeSummary();}
function stepReps(d){form.reps=Math.max(1,form.reps+d);const e=document.getElementById('v-reps');if(e)e.textContent=form.reps;}
function stepWork(d){form.workSecs=Math.max(5,form.workSecs+d);const e=document.getElementById('v-work');if(e)e.textContent=fmtTime(form.workSecs);updateTimeSummary();}
function stepPause(d){form.pauseSecs=Math.max(5,form.pauseSecs+d);const e=document.getElementById('pause-val');if(e)e.textContent=fmtTime(form.pauseSecs);updateTimeSummary();}
function stepWeight(d){form.weight=Math.max(0,Math.min(99,form.weight+d));syncDrums();}
 
// DRUM ROLLER
let drumTens = 1, drumUnits = 0; // default 10kg
 
function initDrums() {
  drumTens = Math.floor(form.weight / 10) % 10;
  drumUnits = form.weight % 10;
  buildDrum('drum-tens-inner', drumTens, v => { drumTens=v; form.weight=drumTens*10+drumUnits; });
  buildDrum('drum-units-inner', drumUnits, v => { drumUnits=v; form.weight=drumTens*10+drumUnits; });
}
 
function syncDrums() {
  drumTens = Math.floor(form.weight / 10) % 10;
  drumUnits = form.weight % 10;
  scrollDrum('drum-tens-inner', drumTens);
  scrollDrum('drum-units-inner', drumUnits);
}
 
function buildDrum(innerId, selected, onChange) {
  const inner = document.getElementById(innerId);
  const drum = inner.parentElement;
  if (!inner) return;
 
  // Add highlight bar
  if (!drum.querySelector('.drum-highlight')) {
    const hl = document.createElement('div');
    hl.className = 'drum-highlight';
    drum.appendChild(hl);
  }
 
  // Items: 0-9 repeated 3 times for infinite feel, centered on middle set
  inner.innerHTML = '';
  for (let rep = 0; rep < 3; rep++) {
    for (let n = 0; n <= 9; n++) {
      const item = document.createElement('div');
      item.className = 'drum-item' + (rep === 1 && n === selected ? ' selected' : '');
      item.textContent = n;
      inner.appendChild(item);
    }
  }
 
  // Position: center the drum on selected item in middle repetition
  const itemH = 40;
  const drumH = 120;
  const centerOffset = (drumH / 2) - (itemH / 2);
  let currentVal = selected;
  inner.style.transform = `translateY(${-(10 + currentVal) * itemH + centerOffset}px)`;
 
  // Touch/mouse drag
  let startY, startOffset, isDragging = false;
 
  const getOffset = () => {
    const match = inner.style.transform.match(/translateY\((.+)px\)/);
    return match ? parseFloat(match[1]) : 0;
  };
 
  const clamp = (offset) => {
    const min = -(29 * itemH) + centerOffset;
    const max = -0 * itemH + centerOffset;
    return Math.max(min, Math.min(max, offset));
  };
 
  const snap = (offset) => {
    const rawVal = -(offset - centerOffset) / itemH;
    let val = Math.round(rawVal) % 10;
    if (val < 0) val += 10;
    currentVal = val;
    const snappedOffset = -(10 + val) * itemH + centerOffset;
    inner.style.transition = 'transform 0.2s ease';
    inner.style.transform = `translateY(${snappedOffset}px)`;
    // Update highlight
    inner.querySelectorAll('.drum-item').forEach((el, idx) => {
      el.classList.toggle('selected', idx % 10 === val);
    });
    onChange(val);
  };
 
  drum.addEventListener('touchstart', e => {
    isDragging = true;
    startY = e.touches[0].clientY;
    startOffset = getOffset();
    inner.style.transition = 'none';
    e.preventDefault();
  }, { passive: false });
 
  drum.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    inner.style.transform = `translateY(${clamp(startOffset + dy)}px)`;
    e.preventDefault();
  }, { passive: false });
 
  drum.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    snap(getOffset());
  });
 
  drum.addEventListener('mousedown', e => {
    isDragging = true;
    startY = e.clientY;
    startOffset = getOffset();
    inner.style.transition = 'none';
  });
 
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dy = e.clientY - startY;
    inner.style.transform = `translateY(${clamp(startOffset + dy)}px)`;
  });
 
  window.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;
    snap(getOffset());
  });
}
 
function scrollDrum(innerId, val) {
  const inner = document.getElementById(innerId);
  if (!inner) return;
  const itemH = 40, drumH = 120;
  const centerOffset = (drumH / 2) - (itemH / 2);
  inner.style.transition = 'transform 0.2s ease';
  inner.style.transform = `translateY(${-(10 + val) * itemH + centerOffset}px)`;
  inner.querySelectorAll('.drum-item').forEach((el, idx) => {
    el.classList.toggle('selected', idx % 10 === val);
  });
}
function toggleReps(){form.repsEnabled=!form.repsEnabled;document.getElementById('reps-toggle').className='toggle'+(form.repsEnabled?' on':'');document.getElementById('reps-stepper-row').style.display=form.repsEnabled?'flex':'none';}
function togglePause(){form.pauseEnabled=!form.pauseEnabled;document.getElementById('pause-toggle').className='toggle'+(form.pauseEnabled?' on':'');document.getElementById('pause-duration-row').style.display=form.pauseEnabled?'flex':'none';updateTimeSummary();}
function toggleAuto(){form.autoMode=!form.autoMode;document.getElementById('auto-toggle').className='toggle'+(form.autoMode?' on':'');}
function toggleWeight(){form.weightEnabled=!form.weightEnabled;document.getElementById('weight-toggle').className='toggle'+(form.weightEnabled?' on':'');const wr=document.getElementById('weight-row');wr.style.display=form.weightEnabled?'flex':'none';if(form.weightEnabled)initDrums();}
 
function updateTimeSummary() {
  const field=document.getElementById('time-summary-field');
  if(form.type!=='timer'){field.style.display='none';return;}
  field.style.display='block';
  const work=form.sets*form.workSecs;
  const pause=form.pauseEnabled?(form.sets-1)*form.pauseSecs:0;
  document.getElementById('time-summary-val').textContent=fmtTime(work+pause);
  document.getElementById('time-summary-sub').textContent=pause?`${fmtTime(work)} travail + ${fmtTime(pause)} pause`:`${fmtTime(work)} de travail`;
}
 
function saveExercise() {
  const name=document.getElementById('ex-name').value.trim();
  if(!name){alert('Donne un nom à ton exercice !');return;}
  const ex={name,type:form.type,sets:form.sets,workSecs:form.workSecs,reps:form.reps,repsEnabled:form.repsEnabled,pauseEnabled:form.pauseEnabled,pauseSecs:form.pauseSecs,autoMode:form.autoMode,weightEnabled:form.weightEnabled,weight:form.weight};
  if(editingIdx!==null)exercises[editingIdx]=ex; else exercises.push(ex);
  localStorage.setItem('gymflow_exercises',JSON.stringify(exercises));
  renderHome(); goHome();
}
 
// ===== WORKOUT =====
let wEx=null, wExIdx=-1, wCurrent=0, wDone=false;
let timerInterval=null, timerSecs=0, timerRunning=false;
let pauseInterval=null, pauseRemaining=0;
 
function restartWorkout(){if(wExIdx>=0&&wExIdx<exercises.length)startWorkout(wExIdx);else goHome();}
 
function startWorkout(i) {
  if(i<0||i>=exercises.length){goHome();return;}
  wEx=exercises[i]; wExIdx=i; wCurrent=0; wDone=false; clearTimers();
  document.getElementById('workout-name').textContent=wEx.name;
  const wb=document.getElementById('workout-weight-bar');
  let wbParts = [];
  if(wEx.weightEnabled) wbParts.push('⚖️ '+wEx.weight+' kg');
  if(wEx.type==='timer'){
    const work=wEx.sets*wEx.workSecs;
    const pause=wEx.pauseEnabled?(wEx.sets-1)*wEx.pauseSecs:0;
    wbParts.push('⏱ '+fmtTime(work+pause));
  }
  if(wbParts.length){wb.style.display='block';wb.textContent=wbParts.join('   ');}else{wb.style.display='none';}
  renderSeriesProgress(); renderWorkoutBody(); showScreen('workout');
}
 
function renderSeriesProgress() {
  const el=document.getElementById('series-progress');
  el.innerHTML='';
  for(let i=0;i<wEx.sets;i++){const d=document.createElement('div');d.className='series-dot'+(i<wCurrent?' done':i===wCurrent?' active':'');el.appendChild(d);}
}
 
function renderWorkoutBody() {
  const body=document.getElementById('workout-body');
  if(wDone){
    saveHistory();
    body.innerHTML=`<div class="done-screen"><div class="done-emoji">🏆</div><div class="done-title">TERMINÉ !</div><div class="done-sub">${wEx.sets} séries de ${wEx.name} complétées. Bravo !</div><button class="done-btn" onclick="restartWorkout()">🔁 Recommencer</button><button class="done-btn-outline" onclick="goHome()">← Retour</button></div>`;
    return;
  }
  if(wEx.type==='timer') renderTimerMode(body); else renderRepsMode(body);
}
 
function saveHistory() {
  const h=JSON.parse(localStorage.getItem('gymflow_history')||'[]');
  h.push({exIdx:wExIdx,exName:wEx.name,date:new Date().toISOString(),sets:wEx.sets,reps:wEx.repsEnabled?wEx.reps:null,weight:wEx.weightEnabled?wEx.weight:null,type:wEx.type,workSecs:wEx.workSecs});
  localStorage.setItem('gymflow_history',JSON.stringify(h));
}
 
// TIMER
function renderTimerMode(body) {
  const circ=Math.PI*2*96;
  body.innerHTML=`
    ${wEx.autoMode?'<div class="auto-badge">⚡ MODE AUTO — Enchaînement automatique</div>':''}
    <div class="timer-display">
      <div class="phase-label work" id="phase-label">TRAVAIL · SÉRIE ${wCurrent+1}/${wEx.sets}</div>
      <div class="clock-ring">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="96"/>
          <circle class="ring-progress" id="ring-path" cx="110" cy="110" r="96" style="stroke-dasharray:${circ};stroke-dashoffset:0"/>
        </svg>
        <div class="clock-time" id="clock-time">${fmtClock(wEx.workSecs)}</div>
      </div>
    </div>
    <div class="timer-controls">
      <button class="ctrl-btn btn-reset" onclick="resetTimer()">↺</button>
      <button class="ctrl-btn btn-play" id="play-btn" onclick="toggleTimer()">${wEx.autoMode?'⚡ AUTO':'▶'}</button>
      <button class="ctrl-btn btn-skip" onclick="skipTimer()">⏭</button>
    </div>`;
  timerSecs=wEx.workSecs; timerRunning=false;
  updateTimerUI();
  if(wEx.autoMode) setTimeout(()=>startTimer(),400);
}
 
function fmtClock(s){const m=Math.floor(s/60),r=s%60;return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');}
function toggleTimer(){if(timerRunning)pauseTimerOnly();else startTimer();}
 
function startTimer() {
  timerRunning=true;
  const btn=document.getElementById('play-btn');
  if(btn)btn.textContent='⏸';
  timerInterval=setInterval(()=>{timerSecs--;updateTimerUI();if(timerSecs<=0)timerPhaseEnd();},1000);
}
 
function pauseTimerOnly() {
  timerRunning=false; clearInterval(timerInterval);
  const btn=document.getElementById('play-btn');
  if(btn)btn.textContent=wEx.autoMode?'⚡ AUTO':'▶';
}
 
function resetTimer() {
  clearInterval(timerInterval); timerRunning=false; timerSecs=wEx.workSecs;
  const btn=document.getElementById('play-btn');if(btn)btn.textContent=wEx.autoMode?'⚡ AUTO':'▶';
  const pl=document.getElementById('phase-label');if(pl){pl.textContent=`TRAVAIL · SÉRIE ${wCurrent+1}/${wEx.sets}`;pl.className='phase-label work';}
  updateTimerUI();
}
 
function skipTimer(){clearInterval(timerInterval);timerRunning=false;timerPhaseEnd();}
 
function timerPhaseEnd() {
  clearInterval(timerInterval); timerRunning=false;
  wCurrent++;
  if(wCurrent>=wEx.sets){wDone=true;renderSeriesProgress();renderWorkoutBody();return;}
  renderSeriesProgress();
  if(wEx.pauseEnabled) showPauseOverlay(()=>renderTimerMode(document.getElementById('workout-body')));
  else renderTimerMode(document.getElementById('workout-body'));
}
 
function updateTimerUI() {
  const ct=document.getElementById('clock-time'),rp=document.getElementById('ring-path');
  if(!ct||!rp)return;
  ct.textContent=fmtClock(timerSecs);
  rp.style.strokeDashoffset=(Math.PI*2*96)*(1-timerSecs/wEx.workSecs);
}
 
// REPS
function renderRepsMode(body) {
  const rb=wEx.repsEnabled?`<div class="reps-big">${wEx.reps}</div><div class="reps-label">répétitions</div>`:`<div class="reps-label" style="margin-bottom:0;font-size:16px;color:var(--text)">Effectue ta série</div>`;
  const pb=wCurrent>0?`<button class="prev-serie-btn" onclick="prevSerie()">← Série précédente</button>`:'';
  body.innerHTML=`<div class="reps-display"><div class="reps-info">SÉRIE ${wCurrent+1} / ${wEx.sets}</div>${rb}<button class="validate-btn" onclick="validateSerie()"><span style="font-size:42px">✓</span><span>VALIDÉE</span></button>${pb}</div>`;
}
 
function prevSerie() {
  if(wCurrent<=0)return;
  clearInterval(pauseInterval);
  document.getElementById('pause-overlay').classList.remove('visible');
  wCurrent--; renderSeriesProgress(); renderRepsMode(document.getElementById('workout-body'));
}
 
function validateSerie() {
  wCurrent++;
  if(wCurrent>=wEx.sets){wDone=true;renderSeriesProgress();renderWorkoutBody();return;}
  renderSeriesProgress();
  if(wEx.pauseEnabled)showPauseOverlay(()=>renderRepsMode(document.getElementById('workout-body')));
  else renderRepsMode(document.getElementById('workout-body'));
}
 
// PAUSE
function showPauseOverlay(onDone) {
  pauseRemaining=wEx.pauseSecs;
  const ov=document.getElementById('pause-overlay');
  ov.classList.add('visible'); ov._onDone=onDone;
  updatePauseOverlay();
  pauseInterval=setInterval(()=>{pauseRemaining--;updatePauseOverlay();if(pauseRemaining<=0)endPauseOverlay(onDone);},1000);
}
 
function updatePauseOverlay() {
  const te=document.getElementById('pause-ring-time'),rg=document.getElementById('pause-ring-path');
  if(!te)return;
  te.textContent=pauseRemaining;
  const circ=Math.PI*2*118;
  rg.style.strokeDasharray=circ;
  rg.style.strokeDashoffset=circ*(1-pauseRemaining/wEx.pauseSecs);
}
 
function skipPause(){endPauseOverlay(document.getElementById('pause-overlay')._onDone);}
 
function endPauseOverlay(onDone) {
  clearInterval(pauseInterval);
  document.getElementById('pause-overlay').classList.remove('visible');
  if(onDone)onDone();
}
 
// ===== HISTORY =====
function openHistory() {
  const allHistory=JSON.parse(localStorage.getItem('gymflow_history')||'[]');
  const title=document.getElementById('hist-title');
  const list=document.getElementById('history-list');
  const backBtn=document.getElementById('hist-back');
  const fromWorkout = document.getElementById('workout').classList.contains('active');
  backBtn.onclick=()=>showScreen(fromWorkout?'workout':'home');
  const entries=wEx&&fromWorkout?allHistory.filter(h=>h.exName===wEx.name):allHistory;
  title.textContent=wEx&&fromWorkout?'HISTORIQUE — '+wEx.name.toUpperCase():'HISTORIQUE';
  list.innerHTML='';
  if(!entries.length){list.innerHTML=`<div class="empty-state"><div class="emoji">📋</div><p>Aucune séance enregistrée</p></div>`;showScreen('history');return;}
  [...entries].reverse().forEach(h=>{
    const globalIdx=allHistory.indexOf(h);
    const d=new Date(h.date);
    const ds=d.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'long'})+' · '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const info=h.type==='timer'?`${h.sets} séries · ${fmtTime(h.workSecs)} travail`:`${h.sets} séries${h.reps?' × '+h.reps+' reps':''}`;
    const entry=document.createElement('div');
    entry.className='history-entry';
    entry.innerHTML=`<button class="history-del" onclick="deleteHistoryEntry(${globalIdx})">🗑</button><div class="history-date">${ds}${h.exName&&!wEx?' — '+h.exName:''}</div><div class="history-info">${info}</div>${h.weight?`<div class="history-weight">⚖️ ${h.weight} kg</div>`:''}`;
    list.appendChild(entry);
  });
  showScreen('history');
}
 
function deleteHistoryEntry(idx) {
  const h=JSON.parse(localStorage.getItem('gymflow_history')||'[]');
  h.splice(idx,1);
  localStorage.setItem('gymflow_history',JSON.stringify(h));
  openHistory();
}
 
// ===== NAV =====
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){clearTimers();renderHome();showScreen('home');}
function clearTimers(){clearInterval(timerInterval);clearInterval(pauseInterval);timerRunning=false;}
 
renderHome();
</script>
</body>
</html>
